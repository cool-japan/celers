[package]
name = "celers-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Command-line interface for CeleRS worker and queue management"
keywords = ["celery", "cli", "worker", "queue", "management"]
categories = ["asynchronous", "command-line-utilities"]

[[bin]]
name = "celers"
path = "src/main.rs"

[dependencies]
celers-core = { path = "../celers-core" }
celers-worker = { path = "../celers-worker" }
celers-broker-redis = { path = "../celers-broker-redis" }
celers-broker-postgres = { path = "../celers-broker-postgres" }
celers-metrics = { path = "../celers-metrics" }
clap = { workspace = true }
clap_complete = "4.5.38"
clap_mangen = "0.2.24"
tokio = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
redis = { workspace = true }
chrono = { workspace = true }
sqlx = { workspace = true }
toml = "0.8.19"
tabled = "0.16.0"
colored = "2.1.0"
reqwest = { version = "0.12", features = ["json"] }
ratatui = "0.29"
crossterm = "0.28"

[dev-dependencies]
tempfile = "3.15.0"
